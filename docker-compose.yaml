services:
  tools:
    profiles:
      - tools
    build:
      context: data
    volumes:
      - ./:/data
    restart: unless-stopped

  tileserver-gl:
    image: maptiler/tileserver-gl
    ports:
      - "8080:8080" # HOST:CONTAINER, edit only HOST part
    volumes:
      - ./:/data
      # - ./config.json:/config.json
      # - ./data:/data
      # - ./styles:/styles
      # - ./fonts:/font-glyphs
    command:
      tileserver-gl -c config.json
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8081:8081"
    environment:
      - NGINX_RASTER_TILE_HOST=${NGINX_RASTER_TILE_HOST:-}
      - NGINX_RASTER_REFERER_HOST=${NGINX_RASTER_REFERER_HOST:-}
    volumes:
      - ./nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - tile_cache:/var/cache/nginx
    restart: unless-stopped

volumes:
  tile_cache:
